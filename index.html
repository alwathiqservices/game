<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الواثق فود - أساطير الفلوجة</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');

        :root {
            --alwathiq-blue: #005eff;
            --alwathiq-gold: #ffcc00;
            --road-grey: #222;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; touch-action: none;
            user-select: none;
        }

        body {
            background: #000;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
            font-family: 'Cairo', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100dvh;
            max-width: 500px;
            background: #111;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        canvas { width: 100%; height: 100%; display: block; }

        /* UI Elements */
        #ui-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: 10;
        }

        #hud {
            padding: 45px 20px 20px;
            display: flex; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .stat-item {
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--alwathiq-blue);
            border-radius: 12px; padding: 8px 15px;
            color: #fff; text-align: center;
            min-width: 100px; backdrop-filter: blur(5px);
        }

        .stat-label { font-size: 10px; color: var(--alwathiq-blue); text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: 900; }

        #fuel-wrap {
            position: absolute; top: 110px; left: 20px; right: 20px;
            height: 10px; background: rgba(255,255,255,0.1);
            border-radius: 5px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
        }
        #fuel-bar {
            height: 100%; width: 100%;
            background: linear-gradient(90deg, #ff0000, #00ff00);
            transition: width 0.2s linear;
        }

        #controls {
            position: absolute; bottom: 40px; left: 0; right: 0;
            display: flex; justify-content: space-evenly;
            pointer-events: all;
        }
        .btn {
            width: 80px; height: 80px;
            background: rgba(255,255,255,0.1);
            border: 3px solid var(--alwathiq-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,94,255,0.3);
        }
        .btn:active { background: var(--alwathiq-blue); transform: scale(0.9); }

        /* Overlays */
        .screen {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100; padding: 40px; text-align: center;
            pointer-events: all;
        }
        h1 { color: var(--alwathiq-blue); font-size: 40px; margin-bottom: 10px; }
        p { color: #ccc; margin-bottom: 30px; line-height: 1.6; }
        
        .start-btn {
            background: var(--alwathiq-blue);
            color: white; border: none;
            padding: 15px 40px; font-size: 20px;
            font-weight: 900; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 30px rgba(0,94,255,0.5);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="hud">
            <div class="stat-item">
                <div class="stat-label">النقاط</div>
                <div class="stat-value" id="scoreVal">0</div>
            </div>
            <div class="stat-item" style="border-color: var(--alwathiq-gold);">
                <div class="stat-label">الطلبات</div>
                <div class="stat-value" id="orderVal">0</div>
            </div>
        </div>
        <div id="fuel-wrap"><div id="fuel-bar"></div></div>
        
        <div id="controls">
            <div class="btn" id="lBtn">◀</div>
            <div class="btn" id="rBtn">▶</div>
        </div>
    </div>

    <!-- شاشة البداية -->
    <div id="start-screen" class="screen">
        <div style="font-size: 14px; color: var(--alwathiq-gold);">مجموعة الواثق تقدم</div>
        <h1>الواثق فود</h1>
        <p>ميثاق، الفلوجة تعتمد عليك! <br> وصّل الطلبات بحي النزال والجولان وأثبت إنك الأسرع.</p>
        <button class="start-btn" onclick="startGame()">انطلق يا بطل 🛵</button>
    </div>

    <!-- شاشة النهاية -->
    <div id="over-screen" class="screen" style="display: none;">
        <h1 style="color: #ff4444;">انتهى الوقت!</h1>
        <p id="final-stats"></p>
        <button class="start-btn" onclick="location.reload()">محاولة ثانية</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('scoreVal');
const orderEl = document.getElementById('orderVal');
const fuelBar = document.getElementById('fuel-bar');

let W, H, lanes, gameActive = false;
let score = 0, orders = 0, fuel = 100, speed = 7;
let roadOffset = 0;

// الكائنات
let bike = { lane: 1, x: 0, y: 0, targetX: 0, width: 40, height: 80 };
let objects = []; // سيارات وطلبات
let buildings = []; // بنايات شركات الواثق
let signs = []; // لافتات الفلوجة

function init() {
    W = canvas.width = window.innerWidth > 500 ? 500 : window.innerWidth;
    H = canvas.height = window.innerHeight;
    lanes = [W * 0.22, W * 0.41, W * 0.59, W * 0.78];
    bike.y = H * 0.75;
    bike.targetX = lanes[bike.lane];
    bike.x = bike.targetX;
    
    // توليد بنايات أولية
    for(let i=0; i<5; i++) spawnBuilding(i * (H/3));
}

function spawnBuilding(y) {
    const side = Math.random() > 0.5 ? 'left' : 'right';
    buildings.push({
        x: side === 'left' ? 0 : W - 70,
        y: y,
        w: 70, h: 160 + Math.random() * 100,
        type: Math.floor(Math.random() * 3), // 0: برمجيات, 1: فود, 2: خدمات
        side: side
    });
}

function spawnSign() {
    const locations = ["حي النزال", "الجولان", "شارع 40", "حي العسكري", "الفلوجة ترحب بكم"];
    signs.push({
        x: W - 40, y: -100,
        text: locations[Math.floor(Math.random() * locations.length)]
    });
}

function spawnObject() {
    const lane = Math.floor(Math.random() * 4);
    const isPowerup = Math.random() > 0.7;
    
    if (isPowerup) {
        objects.push({
            type: Math.random() > 0.4 ? 'box' : 'fuel',
            x: lanes[lane], y: -100, w: 30, h: 30
        });
    } else {
        const carColors = ['#cc0000', '#eeeeee', '#333333', '#004400'];
        objects.push({
            type: 'car',
            x: lanes[lane], y: -100, w: 45, h: 90,
            color: carColors[Math.floor(Math.random() * carColors.length)]
        });
    }
}

// رسم الدراجة (الماطور) بشكل واقعي
function drawBike() {
    ctx.save();
    ctx.translate(bike.x, bike.y);
    
    // ظل الدراجة
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 35, 20, 10, 0, 0, Math.PI*2); ctx.fill();

    // جسم الدراجة الرئيسي (أزرق الواثق)
    ctx.fillStyle = '#005eff';
    ctx.beginPath(); ctx.roundRect(-12, -25, 24, 50, 10); ctx.fill();
    
    // المقعد والماكينة
    ctx.fillStyle = '#111';
    ctx.fillRect(-10, -5, 20, 25);
    
    // الخوذة (رأس السائق)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(0, -15, 12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333'; // واقي الخوذة
    ctx.fillRect(-9, -18, 18, 6);
    
    // صندوق الواثق فود (بالخلف)
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-18, 15, 36, 30);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.strokeRect(-18, 15, 36, 30);
    ctx.fillStyle = '#000'; ctx.font = 'bold 10px Cairo';
    ctx.textAlign = 'center'; ctx.fillText("الواثق", 0, 35);
    
    ctx.restore();
}

// رسم السيارة بشكل واقعي
function drawCar(o) {
    ctx.save();
    ctx.translate(o.x, o.y);
    // ظل
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(-o.w/2 + 5, 5, o.w, o.h);
    // الجسم
    ctx.fillStyle = o.color;
    ctx.beginPath(); ctx.roundRect(-o.w/2, -o.h/2, o.w, o.h, 12); ctx.fill();
    // الزجاج
    ctx.fillStyle = '#222';
    ctx.fillRect(-o.w/2 + 5, -o.h/2 + 15, o.w - 10, 20); // أمامي
    ctx.fillRect(-o.w/2 + 5, o.h/2 - 25, o.w - 10, 15);  // خلفي
    // الأضواء
    ctx.fillStyle = '#ffff00'; ctx.fillRect(-o.w/2 + 5, -o.h/2 + 2, 10, 5); ctx.fillRect(o.w/2 - 15, -o.h/2 + 2, 10, 5);
    ctx.fillStyle = '#ff0000'; ctx.fillRect(-o.w/2 + 5, o.h/2 - 7, 10, 5); ctx.fillRect(o.w/2 - 15, o.h/2 - 7, 10, 5);
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // 1. رسم الطريق
    ctx.fillStyle = '#333';
    ctx.fillRect(W*0.15, 0, W*0.7, H);
    
    // خطوط الطريق المتحركة
    ctx.strokeStyle = '#fff';
    ctx.setLineDash([40, 40]);
    ctx.lineDashOffset = -roadOffset;
    ctx.lineWidth = 4;
    for(let i=1; i<4; i++) {
        const lx = W*0.15 + (i * (W*0.7/4));
        ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
    }
    ctx.setLineDash([]);

    // 2. رسم البنايات (شركات الواثق)
    buildings.forEach(b => {
        ctx.fillStyle = '#1a2a44';
        ctx.fillRect(b.x, b.y, b.w, b.h);
        // شبابيك
        ctx.fillStyle = '#ffcc0044';
        for(let r=0; r<5; r++) {
            for(let c=0; c<2; c++) ctx.fillRect(b.x + 10 + c*30, b.y + 20 + r*30, 20, 15);
        }
        // لوحة الشركة
        ctx.fillStyle = varColor = b.type === 0 ? '#00fbff' : '#ffcc00';
        ctx.fillRect(b.x, b.y + 5, b.w, 25);
        ctx.fillStyle = '#000'; ctx.font = 'bold 10px Cairo';
        const name = ["الواثق للبرمجة", "الواثق فود", "خدمات الواثق"][b.type];
        ctx.fillText(name, b.x + 5, b.y + 22);
    });

    // 3. لافتات الشوارع
    signs.forEach(s => {
        ctx.fillStyle = '#005500';
        ctx.fillRect(s.x - 60, s.y, 100, 30);
        ctx.fillStyle = '#fff'; ctx.font = '12px Cairo';
        ctx.fillText(s.text, s.x - 55, s.y + 20);
    });

    // 4. رسم الدراجة
    drawBike();

    // 5. رسم السيارات والمواد
    objects.forEach(o => {
        if(o.type === 'car') drawCar(o);
        else {
            ctx.font = '30px Arial';
            ctx.fillText(o.type === 'box' ? '📦' : '⛽', o.x - 15, o.y);
        }
    });
}

function update() {
    if (!gameActive) return;

    roadOffset += speed;
    fuel -= 0.04;
    if (fuel <= 0) endGame();

    // حركة الدراجة السلسة
    bike.x += (bike.targetX - bike.x) * 0.15;

    // تحريك البنايات
    buildings.forEach(b => {
        b.y += speed;
        if(b.y > H) { b.y = -300; b.type = Math.floor(Math.random() * 3); }
    });

    // تحريك اللافتات
    signs.forEach((s, i) => {
        s.y += speed;
        if(s.y > H) signs.splice(i, 1);
    });

    // تحريك السيارات والطلبات
    objects.forEach((o, i) => {
        o.y += (o.type === 'car' ? speed * 0.6 : speed);
        
        // فحص التصادم
        const dist = Math.hypot(o.x - bike.x, o.y - bike.y);
        if (dist < 40) {
            if (o.type === 'car') {
                fuel -= 20; // الاصطدام يقلل الوقود
                objects.splice(i, 1);
                shakeCanvas();
            } else if (o.type === 'box') {
                orders++; score += 100;
                objects.splice(i, 1);
            } else if (o.type === 'fuel') {
                fuel = Math.min(100, fuel + 30);
                objects.splice(i, 1);
            }
        }
        if(o.y > H + 100) objects.splice(i, 1);
    });

    // سباون عشوائي
    if (Math.random() < 0.02) spawnObject();
    if (Math.random() < 0.005) spawnSign();

    speed += 0.0005;
    scoreEl.innerText = Math.floor(score);
    orderEl.innerText = orders;
    fuelBar.style.width = fuel + '%';
    
    draw();
    requestAnimationFrame(update);
}

function shakeCanvas() {
    canvas.style.transform = `translate(${Math.random()*10-5}px, ${Math.random()*10-5}px)`;
    setTimeout(() => canvas.style.transform = 'translate(0,0)', 100);
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    gameActive = true;
    init();
    update();
}

function endGame() {
    gameActive = false;
    document.getElementById('over-screen').style.display = 'flex';
    document.getElementById('final-stats').innerHTML = `عاشت إيدك يا ميثاق!<br>جمعت <b>${orders}</b> طلبات <br> وسجلت <b>${Math.floor(score)}</b> نقطة.`;
}

// التحكم
const moveLeft = () => { if(bike.lane > 0) { bike.lane--; bike.targetX = lanes[bike.lane]; } };
const moveRight = () => { if(bike.lane < 3) { bike.lane++; bike.targetX = lanes[bike.lane]; } };

document.getElementById('lBtn').onclick = moveLeft;
document.getElementById('rBtn').onclick = moveRight;
document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowLeft') moveLeft();
    if(e.key === 'ArrowRight') moveRight();
});

init();
draw();
</script>
</body>
</html>
