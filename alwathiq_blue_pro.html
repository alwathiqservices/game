
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
#gr{direction:rtl;background:#030d1a;border-radius:14px;overflow:hidden;position:relative;min-height:560px;user-select:none}
canvas{display:block;width:100%}
#ui{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none}

.glass{background:rgba(0,80,180,0.18);border:1px solid rgba(100,180,255,0.28);border-radius:12px;backdrop-filter:blur(8px)}

#topbar{position:absolute;top:8px;left:12px;right:12px;display:flex;gap:8px;align-items:center;pointer-events:none}
.tb{padding:6px 12px;font-size:12px;font-weight:700;color:#7df;letter-spacing:.5px}
.tb span{color:#fff;font-size:14px}
#fuelWrap{flex:1;height:8px;background:rgba(0,40,100,0.6);border-radius:4px;border:1px solid rgba(100,200,255,0.2)}
#fuelBar{height:100%;border-radius:4px;background:linear-gradient(90deg,#00cfff,#0055ff);transition:width .3s}

#notif{position:absolute;top:52px;left:50%;transform:translateX(-50%) translateY(-200%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;padding:7px 20px;font-size:12px;font-weight:700;color:#bef;pointer-events:none;z-index:30}
#notif.show{transform:translateX(-50%) translateY(0)}

#lbPanel{position:absolute;top:54px;left:10px;padding:10px 14px;min-width:150px;pointer-events:all}
#lbPanel h3{font-size:11px;color:#5af;font-weight:700;margin-bottom:6px;letter-spacing:1px}
.lbRow{font-size:11px;color:#adf;padding:2px 0;display:flex;justify-content:space-between;gap:12px}
.lbRow b{color:#fff}

#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(1,8,22,0.92);border-radius:14px;pointer-events:all;z-index:40}
#overlay h1{font-size:28px;font-weight:900;color:#00d4ff;margin-bottom:4px;text-shadow:0 0 20px rgba(0,212,255,0.5)}
#overlay .sub{font-size:13px;color:#7bf;margin-bottom:18px;text-align:center;max-width:300px;line-height:1.7}
#overlay .stars{font-size:32px;margin:4px 0 10px;letter-spacing:6px}
#overlay .stat{font-size:12px;color:#8cf;margin-bottom:14px}
.btn{background:linear-gradient(135deg,#0044cc,#0099ff);color:#fff;font-weight:800;font-size:14px;border:none;border-radius:10px;padding:11px 32px;cursor:pointer;pointer-events:all;letter-spacing:.5px;transition:transform .1s,box-shadow .2s}
.btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,150,255,0.5)}
#nameWrap{display:flex;gap:8px;margin-bottom:14px;pointer-events:all}
#nameWrap input{background:rgba(0,60,180,0.3);border:1px solid rgba(100,180,255,0.4);border-radius:8px;padding:8px 12px;color:#fff;font-size:13px;outline:none;width:160px;text-align:right}

#soundBtn{position:absolute;bottom:10px;right:12px;background:rgba(0,50,150,0.4);border:1px solid rgba(100,180,255,0.3);border-radius:8px;padding:5px 10px;color:#7df;font-size:11px;cursor:pointer;pointer-events:all;z-index:50}
#ctrlHint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(100,180,255,0.4);pointer-events:none}
</style>

<div id="gr">
  <canvas id="gc" width="680" height="520"></canvas>
  <div id="ui">
    <div id="topbar">
      <div class="glass tb">HP: <span id="hpV">3</span></div>
      <div class="glass tb">نقاط: <span id="scV">0</span></div>
      <div class="glass tb">طلبات: <span id="orV">0</span></div>
      <div class="glass tb" style="display:flex;align-items:center;gap:6px;flex:1">
        <span style="font-size:10px;color:#5af">وقود</span>
        <div id="fuelWrap"><div id="fuelBar" style="width:100%"></div></div>
      </div>
      <div class="glass tb">Lv.<span id="lvV">1</span></div>
    </div>
    <div id="notif" class="glass"></div>
    <div id="lbPanel" class="glass">
      <h3>قادة الفلوجة</h3>
      <div id="lbList"></div>
    </div>
    <div id="overlay">
      <h1>الواثق فود</h1>
      <div class="sub">النسخة الزرقاء الاحترافية<br>وصّل الطلبات، اجمع الوقود، تجنب العوائق!</div>
      <div id="nameWrap"><input id="nameIn" placeholder="اسمك يا بطل" maxlength="18"/></div>
      <button class="btn" onclick="G.start()">انطلق يا ريس</button>
    </div>
    <button id="soundBtn" onclick="G.toggleSound()">الصوت: تشغيل</button>
    <div id="ctrlHint">اضغط سهم أعلى/أسفل ・ أو اسحب شاشة اللمس</div>
  </div>
</div>

<script>
const cv=document.getElementById('gc'), ctx=cv.getContext('2d');
const W=680,H=520;
const LANES=[110,195,285,375,460];

class AudioEngine{
  constructor(){this.ctx=null;this.on=true;this.bgNode=null;}
  init(){
    if(this.ctx)return;
    this.ctx=new(window.AudioContext||window.webkitAudioContext)();
  }
  _osc(freq,type,dur,vol=0.18,dest){
    if(!this.ctx||!this.on)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type;o.frequency.value=freq;
    g.gain.setValueAtTime(vol,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+dur);
    o.connect(g);g.connect(dest||this.ctx.destination);
    o.start();o.stop(this.ctx.currentTime+dur);
  }
  ding(){this._osc(880,'sine',0.35,0.22);}
  warn(){this._osc(300,'sawtooth',0.25,0.15);setTimeout(()=>this._osc(250,'sawtooth',0.2,0.12),120);}
  boom(){this._osc(80,'sawtooth',0.4,0.28);this._osc(120,'square',0.3,0.2);}
  fuel(){this._osc(660,'triangle',0.2,0.15);}
  engineHum(speed){
    if(!this.ctx||!this.on)return;
    if(!this._engG){
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='sawtooth';o.frequency.value=80;g.gain.value=0.04;
      o.connect(g);g.connect(this.ctx.destination);o.start();
      this._engO=o;this._engG=g;
    }
    this._engO.frequency.value=70+speed*90;
  }
  stopEngine(){if(this._engG)this._engG.gain.value=0;}
  ambient(){
    if(!this.ctx||!this.on)return;
    [220,330,440].forEach((f,i)=>{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type='sine';o.frequency.value=f;g.gain.value=0.012;
      o.connect(g);g.connect(this.ctx.destination);o.start();
      this._amb=(this._amb||[]).concat([{o,g}]);
    });
  }
  stopAmbient(){(this._amb||[]).forEach(a=>{try{a.g.gain.value=0;}catch(e){}});}
  toggle(){
    this.on=!this.on;
    if(!this.on){this.stopEngine();this.stopAmbient();}
    else if(this.ctx){this.ambient();}
    document.getElementById('soundBtn').textContent='الصوت: '+(this.on?'تشغيل':'إيقاف');
  }
}

class Particle{
  constructor(x,y,color='#00aaff'){
    this.x=x;this.y=y;
    this.vx=(Math.random()-0.5)*5;
    this.vy=(Math.random()-2)*4;
    this.r=2+Math.random()*4;
    this.life=1;this.decay=0.03+Math.random()*0.04;
    this.color=color;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.12;this.life-=this.decay;this.r*=0.96;}
  draw(c){
    c.save();c.globalAlpha=Math.max(0,this.life);
    c.fillStyle=this.color;
    c.beginPath();c.arc(this.x,this.y,this.r,0,Math.PI*2);c.fill();
    c.restore();
  }
}

class Obstacle{
  constructor(lane,type,speed){
    this.lane=lane;this.type=type;this.speed=speed;
    this.x=W+50;this.y=LANES[lane];
    this.w=type==='truck'?90:type==='hole'?50:65;
    this.h=type==='hole'?20:36;
    this.phase=0;this.warned=false;
  }
  update(spd){this.x-=spd*(this.type==='fast'?2.2:1.2);this.phase+=0.1;}
  draw(c){
    c.save();c.translate(this.x,this.y);
    if(this.type==='hole'){
      const g=c.createRadialGradient(0,8,2,0,8,28);
      g.addColorStop(0,'#000');g.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=g;c.beginPath();c.ellipse(0,8,26,14,0,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(255,60,0,0.7)';c.font='16px Arial';c.textAlign='center';c.fillText('⚠',0,-6);
    } else if(this.type==='cat'){
      const bob=Math.sin(this.phase)*14;c.translate(0,bob);
      c.fillStyle='#6688aa';
      c.beginPath();c.ellipse(0,6,14,10,0,0,Math.PI*2);c.fill();
      c.beginPath();c.ellipse(0,-5,9,8,0,0,Math.PI*2);c.fill();
      c.fillStyle='#88aacc';
      c.beginPath();c.moveTo(-8,-12);c.lineTo(-4,-19);c.lineTo(0,-12);c.fill();
      c.beginPath();c.moveTo(0,-12);c.lineTo(4,-19);c.lineTo(8,-12);c.fill();
      c.fillStyle='rgba(0,200,255,0.9)';
      c.beginPath();c.ellipse(-3,-7,3,3,0,0,Math.PI*2);c.fill();
      c.beginPath();c.ellipse(3,-7,3,3,0,0,Math.PI*2);c.fill();
      c.strokeStyle='#6688aa';c.lineWidth=2.5;
      c.beginPath();c.moveTo(14,4);c.quadraticCurveTo(22,-8,16,-18);c.stroke();
    } else if(this.type==='truck'){
      c.fillStyle='#0a2a6e';c.beginPath();c.roundRect(-45,-22,90,44,6);c.fill();
      c.fillStyle='#0044bb';c.beginPath();c.roundRect(-45,-22,34,44,6);c.fill();
      c.fillStyle='rgba(100,200,255,0.5)';c.fillRect(-40,-18,22,14);
      c.fillStyle='rgba(0,150,255,0.8)';
      c.beginPath();c.arc(-32,23,7,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(32,23,7,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(255,255,255,0.6)';c.font='bold 9px Arial';c.textAlign='center';c.fillText('ALWATHIQ',12,5);
    } else {
      const col=this.type==='fast'?'#cc2200':'#1a3a8a';
      c.fillStyle=col;c.beginPath();c.roundRect(-32,-18,64,36,7);c.fill();
      c.fillStyle='rgba(120,210,255,0.6)';c.fillRect(-24,-15,18,11);c.fillRect(6,-15,18,11);
      c.fillStyle='#ff4400';
      c.beginPath();c.arc(-24,19,6,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(24,19,6,0,Math.PI*2);c.fill();
      if(this.type==='fast'){c.fillStyle='rgba(255,100,0,0.5)';for(let i=1;i<=3;i++){c.fillRect(32+i*10,-3,7,6);}}
    }
    c.restore();
  }
}

class Powerup{
  constructor(lane,type){
    this.lane=lane;this.type=type;
    this.x=W+40;this.y=LANES[lane];
    this.phase=0;
  }
  update(spd){this.x-=spd*0.85;this.phase+=0.07;}
  draw(c){
    const bob=Math.sin(this.phase)*6;
    c.save();c.translate(this.x,this.y+bob);
    const g=c.createRadialGradient(0,0,3,0,0,22);
    if(this.type==='order'){g.addColorStop(0,'rgba(0,200,255,0.5)');g.addColorStop(1,'transparent');}
    else if(this.type==='fuel'){g.addColorStop(0,'rgba(0,255,100,0.4)');g.addColorStop(1,'transparent');}
    else if(this.type==='shield'){g.addColorStop(0,'rgba(100,100,255,0.5)');g.addColorStop(1,'transparent');}
    else{g.addColorStop(0,'rgba(255,215,0,0.5)');g.addColorStop(1,'transparent');}
    c.fillStyle=g;c.beginPath();c.arc(0,0,22,0,Math.PI*2);c.fill();
    const icons={'order':'📦','fuel':'⛽','shield':'🛡️','turbo':'⚡'};
    c.font='20px Arial';c.textAlign='center';c.textBaseline='middle';
    c.fillText(icons[this.type]||'?',0,0);
    c.restore();
  }
}

class Game{
  constructor(){
    this.state='menu';this.audio=new AudioEngine();
    this.particles=[];this.obstacles=[];this.powerups=[];
    this.smoke=[];this.raf=null;
    this.leaderboard=JSON.parse(localStorage.getItem('wfLB')||'[]');
    this.renderLB();
    this.bg=this._initBG();
    this._render();
  }
  _initBG(){
    return{
      buildings:Array.from({length:9},(_,i)=>({x:i*100,w:55+Math.random()*40,h:70+Math.random()*90,col:`hsl(${210+i*8},${35+i*4}%,${13+i*2}%)`})),
      clouds:Array.from({length:5},(_,i)=>({x:i*160,y:18+i*8,w:70+i*18})),
      stripes:Array.from({length:14},(_,i)=>({x:i*60})),
      minaret:{x:560,h:130},
      dome:{x:420,h:60},
    };
  }
  start(){
    document.getElementById('overlay').style.display='none';
    this.name=document.getElementById('nameIn').value.trim()||'مجهول';
    this.bikeY=LANES[2];this.targetY=LANES[2];
    this.hp=3;this.score=0;this.orders=0;this.fuel=100;
    this.invincible=0;this.shield=false;this.turbo=false;
    this.turboCd=0;this.shieldCd=0;
    this.frame=0;this.time=0;this.diff=1;this.speed=2.4;
    this.obstacles=[];this.powerups=[];this.particles=[];this.smoke=[];
    this.state='play';
    this.audio.init();
    this.audio.ambient();
    this._schedNotif();
    this._updateHUD();
    if(this.raf)cancelAnimationFrame(this.raf);
    const loop=()=>{if(this.state!=='play')return;this._update();this._render();this.raf=requestAnimationFrame(loop);};
    loop();
  }
  toggleSound(){this.audio.toggle();}
  _update(){
    const s=this;
    s.frame++;s.time+=1/60;
    s.diff=1+Math.floor(s.time/12);
    s.speed=2.4+s.time*0.018+(s.turbo?2:0);
    s.bikeY+=(s.targetY-s.bikeY)*0.13;
    if(s.invincible>0)s.invincible--;
    if(s.turboCd>0){s.turboCd--;if(!s.turboCd){s.turbo=false;}}
    if(s.shieldCd>0){s.shieldCd--;if(!s.shieldCd){s.shield=false;}}
    s.fuel=Math.max(0,s.fuel-0.025*(1+s.diff*0.08));
    if(s.fuel<=0){s.fuel=0;s._damage(0,s.bikeY);this._notif('نفد الوقود! الدراجة وقفت!');}
    if(s.frame%30===0){s.score+=s.diff;s._updateHUD();}
    const spd=s.speed;
    for(let b of s.bg.buildings){b.x-=spd*0.35;if(b.x<-110){b.x=W+10;b.h=70+Math.random()*90;}}
    for(let c of s.bg.clouds){c.x-=spd*0.12;if(c.x<-100)c.x=W+60;}
    for(let r of s.bg.stripes){r.x-=spd;if(r.x<-55)r.x=W+5;}
    const spawnR=Math.max(48-s.diff*3,22);
    if(s.frame%spawnR===0)s._spawnOb();
    const puR=Math.max(200-s.diff*8,100);
    if(s.frame%puR===0)s._spawnPu();
    for(let ob of s.obstacles){
      ob.update(spd);
      if(!ob.warned&&ob.x<s.bikeX+200&&ob.x>s.bikeX+80){ob.warned=true;s.audio.warn();}
    }
    s.obstacles=s.obstacles.filter(o=>o.x>-120);
    for(let pu of s.powerups)pu.update(spd);
    s.powerups=s.powerups.filter(p=>p.x>-60);
    if(s.invincible===0){
      for(let i=s.obstacles.length-1;i>=0;i--){
        const ob=s.obstacles[i];
        if(Math.abs(ob.x-s.bikeX)<34&&Math.abs(ob.y-s.bikeY)<28){
          if(s.shield){s.shield=false;s.shieldCd=0;s.obstacles.splice(i,1);for(let j=0;j<18;j++)s.particles.push(new Particle(ob.x,ob.y,'#4499ff'));s._notif('الدرع امتص الضربة!');}
          else{s.audio.boom();s._damage(ob.x,ob.y);s.obstacles.splice(i,1);}
        }
      }
    }
    for(let i=s.powerups.length-1;i>=0;i--){
      const pu=s.powerups[i];
      if(Math.abs(pu.x-s.bikeX)<28&&Math.abs(pu.y-s.bikeY)<26){s._collect(pu);s.powerups.splice(i,1);}
    }
    if(s.frame%3===0){
      s.smoke.push({x:s.bikeX-30,y:s.bikeY+10,r:4+Math.random()*3,life:26,vx:-1.4-Math.random()*0.6,vy:(Math.random()-0.5)*0.7,col:s.turbo?'#0088ff':'rgba(100,150,220,0.5)'});
    }
    s.smoke=s.smoke.filter(p=>{p.x+=p.vx*spd*0.4;p.y+=p.vy;p.r*=0.93;p.life--;return p.life>0;});
    for(let p of s.particles)p.update();
    s.particles=s.particles.filter(p=>p.life>0);
    s.audio.engineHum(spd/8);
  }
  get bikeX(){return 100;}
  _spawnOb(){
    const types=['car','car','car','fast'];
    if(this.diff>=2)types.push('cat','hole');
    if(this.diff>=3)types.push('truck');
    const type=types[Math.floor(Math.random()*types.length)];
    const lane=Math.floor(Math.random()*LANES.length);
    this.obstacles.push(new Obstacle(lane,type,this.speed));
  }
  _spawnPu(){
    const types=['order','order','fuel','fuel','shield','turbo'];
    const type=types[Math.floor(Math.random()*types.length)];
    const lane=Math.floor(Math.random()*LANES.length);
    this.powerups.push(new Powerup(lane,type));
  }
  _damage(ox,oy){
    this.hp--;this.invincible=90;
    for(let i=0;i<20;i++)this.particles.push(new Particle(ox||this.bikeX,oy||this.bikeY,'#ff4422'));
    this._updateHUD();
    if(this.hp<=0)this._end();
    else this._notif(['اصطدمت! تعال ركز!','انتبه يا ريس!','آي والله!'][Math.floor(Math.random()*3)]);
  }
  _collect(pu){
    this.audio.ding();
    const m={order:'تم تحديث قاعدة بيانات التوصيل! +120',fuel:'جاري مزامنة الوقود... انطلق!',shield:'الدرع مفعّل! لا أحد يوقفك!',turbo:'تُرْبُو نشيط! سبع والله!'};
    this._notif(m[pu.type]);
    if(pu.type==='order'){this.orders++;this.score+=120;this.audio.ding();}
    else if(pu.type==='fuel'){this.fuel=Math.min(100,this.fuel+40);}
    else if(pu.type==='shield'){this.shield=true;this.shieldCd=260;}
    else if(pu.type==='turbo'){this.turbo=true;this.turboCd=200;}
    for(let i=0;i<12;i++)this.particles.push(new Particle(pu.x,pu.y,'#00ccff'));
    this._updateHUD();
  }
  _updateHUD(){
    document.getElementById('hpV').textContent='❤️'.repeat(this.hp)+'🖤'.repeat(3-this.hp);
    document.getElementById('scV').textContent=this.score;
    document.getElementById('orV').textContent=this.orders;
    document.getElementById('lvV').textContent=this.diff;
    document.getElementById('fuelBar').style.width=this.fuel+'%';
    document.getElementById('fuelBar').style.background=this.fuel<25?'linear-gradient(90deg,#ff4400,#ff8800)':'linear-gradient(90deg,#00cfff,#0055ff)';
  }
  _notif(msg){
    const n=document.getElementById('notif');
    n.textContent=msg;n.classList.add('show');
    clearTimeout(this._nt);this._nt=setTimeout(()=>n.classList.remove('show'),2800);
  }
  _schedNotif(){
    if(this.state!=='play')return;
    const msgs=['طلب جديد من الفلوجة الجديدة!','جاري مزامنة الموقع... انطلق!','العميل ينتظر يا بطل!','الواثق ما يتأخر... سبع!','تم تحديث نظام التوصيل','حي النزال يطلب بسرعة!'];
    setTimeout(()=>{if(this.state==='play'){this._notif(msgs[Math.floor(Math.random()*msgs.length)]);this._schedNotif();}},4500+Math.random()*6000);
  }
  _end(){
    this.state='over';this.audio.stopEngine();this.audio.stopAmbient();
    cancelAnimationFrame(this.raf);
    const stars=this.orders>=8?3:this.orders>=4?2:this.orders>=1?1:0;
    const lb=this.leaderboard;
    lb.push({name:this.name,score:this.score,orders:this.orders});
    lb.sort((a,b)=>b.score-a.score);
    this.leaderboard=lb.slice(0,5);
    localStorage.setItem('wfLB',JSON.stringify(this.leaderboard));
    this.renderLB();
    const ov=document.getElementById('overlay');
    ov.innerHTML=`<h1>انتهت الجولة!</h1>
      <div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <div class="stat">نقاط: ${this.score} | طلبات: ${this.orders} | مستوى: ${this.diff}</div>
      <div class="sub">تم حفظ نتيجتك في لوحة المتصدرين</div>
      <div id="nameWrap"><input id="nameIn" value="${this.name}" maxlength="18"/></div>
      <button class="btn" onclick="G.start()">جولة جديدة</button>`;
    ov.style.display='flex';
    this._render();
  }
  renderLB(){
    const lb=this.leaderboard;
    const medals=['🥇','🥈','🥉','4.','5.'];
    document.getElementById('lbList').innerHTML=lb.length?lb.map((e,i)=>`<div class="lbRow"><span>${medals[i]} ${e.name}</span><b>${e.score}</b></div>`).join(''):'<div class="lbRow" style="color:#557">لا يوجد سجلات بعد</div>';
  }
  moveLane(dir){
    const i=LANES.indexOf(Math.round(this.targetY));
    const ci=i>=0?i:LANES.reduce((bi,ly,li)=>Math.abs(ly-this.targetY)<Math.abs(LANES[bi]-this.targetY)?li:bi,0);
    const ni=Math.max(0,Math.min(LANES.length-1,ci+dir));
    this.targetY=LANES[ni];
  }
  _render(){
    ctx.clearRect(0,0,W,H);
    this._drawSky();
    this._drawBuildings();
    this._drawFallujahSkyline();
    this._drawClouds();
    this._drawRoad();
    this._drawStripes();
    this._drawSmoke();
    if(this.state==='play'||this.state==='over'){
      for(let ob of this.obstacles)ob.draw(ctx);
      for(let pu of this.powerups)pu.draw(ctx);
      this._drawBike();
      for(let p of this.particles)p.draw(ctx);
    }
  }
  _drawSky(){
    ctx.fillStyle='#030d1a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(0,80,200,0.08)';ctx.fillRect(0,0,W,H*0.55);
    ctx.fillStyle='rgba(255,255,255,0.55)';
    for(let i=0;i<40;i++){const sx=(i*79+13)%W,sy=(i*41+7)%(H*0.45);ctx.beginPath();ctx.arc(sx,sy,0.7,0,Math.PI*2);ctx.fill();}
  }
  _drawBuildings(){
    for(let b of this.bg.buildings){
      ctx.fillStyle=b.col;ctx.fillRect(b.x,88-b.h,b.w,b.h);
      ctx.fillStyle='rgba(0,180,255,0.25)';
      for(let wy=8;wy<b.h-10;wy+=16)for(let wx=5;wx<b.w-5;wx+=13){if((wy+wx)%3!==0)ctx.fillRect(b.x+wx,88-b.h+wy,5,6);}
    }
  }
  _drawFallujahSkyline(){
    const {minaret,dome}=this.bg;
    ctx.fillStyle='rgba(0,60,120,0.7)';
    ctx.fillRect(minaret.x,88-minaret.h,14,minaret.h);
    ctx.fillRect(minaret.x-4,88-minaret.h,22,14);
    ctx.beginPath();ctx.arc(minaret.x+7,88-minaret.h,9,Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(0,120,200,0.5)';
    ctx.beginPath();ctx.ellipse(dome.x,88,50,dome.h,0,Math.PI,0);ctx.fill();
    ctx.fillStyle='rgba(100,200,255,0.3)';
    ctx.beginPath();ctx.ellipse(dome.x,88,44,dome.h-8,0,Math.PI,0);ctx.fill();
  }
  _drawClouds(){
    ctx.fillStyle='rgba(0,100,200,0.1)';
    for(let c of this.bg.clouds){ctx.beginPath();ctx.ellipse(c.x,c.y,c.w/2,11,0,0,Math.PI*2);ctx.fill();}
  }
  _drawRoad(){
    ctx.fillStyle='#0c1624';ctx.fillRect(0,88,W,H-88);
    ctx.strokeStyle='rgba(0,150,255,0.6)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(0,90);ctx.lineTo(W,90);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,H-8);ctx.lineTo(W,H-8);ctx.stroke();
    ctx.strokeStyle='rgba(0,100,200,0.15)';ctx.lineWidth=1;ctx.setLineDash([18,14]);
    for(let ly of[LANES[0]+55,LANES[1]+55,LANES[2]+55,LANES[3]+55]){
      ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();
    }
    ctx.setLineDash([]);
  }
  _drawStripes(){
    ctx.fillStyle='rgba(0,150,255,0.2)';
    for(let r of this.bg.stripes)ctx.fillRect(r.x,H-35,38,5);
  }
  _drawSmoke(){
    for(let p of this.smoke){
      ctx.save();ctx.globalAlpha=p.life/26*0.5;ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();
    }
  }
  _drawBike(){
    const x=this.bikeX,y=this.bikeY;
    const flash=this.invincible>0&&Math.floor(this.invincible/5)%2===0;
    if(flash)ctx.globalAlpha=0.25;
    ctx.save();ctx.translate(x,y);
    if(this.shield){
      ctx.strokeStyle='rgba(0,150,255,0.7)';ctx.lineWidth=3;
      ctx.beginPath();ctx.ellipse(0,0,42,30,0,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='rgba(0,150,255,0.15)';ctx.lineWidth=10;
      ctx.beginPath();ctx.ellipse(0,0,50,38,0,0,Math.PI*2);ctx.stroke();
    }
    const spd=this.frame;
    ctx.fillStyle='#0a2050';ctx.strokeStyle='rgba(0,120,255,0.8)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(-18,16,12,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.beginPath();ctx.arc(18,16,12,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.strokeStyle='rgba(0,150,255,0.4)';ctx.lineWidth=1;
    for(let a=0;a<Math.PI*2;a+=Math.PI/4){
      ctx.beginPath();ctx.moveTo(-18,16);ctx.lineTo(-18+9*Math.cos(a+spd*0.14),16+9*Math.sin(a+spd*0.14));ctx.stroke();
      ctx.beginPath();ctx.moveTo(18,16);ctx.lineTo(18+9*Math.cos(a-spd*0.14),16+9*Math.sin(a-spd*0.14));ctx.stroke();
    }
    ctx.strokeStyle='rgba(0,150,255,0.9)';ctx.lineWidth=3.5;
    ctx.beginPath();ctx.moveTo(-18,16);ctx.lineTo(0,-5);ctx.lineTo(18,16);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-5);ctx.lineTo(-8,-20);ctx.stroke();
    ctx.fillStyle='#0a1840';ctx.beginPath();ctx.roundRect(-12,-8,24,18,4);ctx.fill();
    ctx.fillStyle='rgba(0,120,255,0.7)';ctx.beginPath();ctx.roundRect(-9,-6,18,12,3);ctx.fill();
    ctx.strokeStyle='rgba(0,200,255,0.5)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(14,-18);ctx.lineTo(28,-14);ctx.stroke();
    ctx.fillStyle='#1a0a50';ctx.beginPath();ctx.roundRect(-10,-34,22,20,4);ctx.fill();
    ctx.strokeStyle='rgba(0,100,255,0.6)';ctx.lineWidth=1;ctx.strokeRect(-10,-34,22,20);
    ctx.fillStyle='rgba(0,200,255,0.8)';ctx.font='bold 7px Arial';ctx.textAlign='center';ctx.fillText('واثق',-1,-21);
    ctx.fillStyle='#e8c87a';ctx.beginPath();ctx.ellipse(4,-38,8,8,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0a2260';ctx.beginPath();ctx.roundRect(-5,-50,18,14,4);ctx.fill();
    ctx.restore();
    ctx.globalAlpha=1;
  }
}

const G=new Game();

document.addEventListener('keydown',e=>{
  if(G.state!=='play')return;
  if(e.key==='ArrowUp'||e.key==='w')G.moveLane(-1);
  if(e.key==='ArrowDown'||e.key==='s')G.moveLane(1);
});

let ty0=0;
document.getElementById('gc').addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
document.getElementById('gc').addEventListener('touchend',e=>{
  if(G.state!=='play')return;
  const dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dy)<12)return;
  if(dy<0)G.moveLane(-1);else G.moveLane(1);
},{passive:true});

document.getElementById('gc').addEventListener('click',e=>{
  if(G.state!=='play')return;
  const rect=cv.getBoundingClientRect();
  const cy=(e.clientY-rect.top)/rect.height*H;
  if(cy<G.bikeY-30)G.moveLane(-1);
  else if(cy>G.bikeY+30)G.moveLane(1);
});
</script>
